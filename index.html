<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お気に入りURLマネージャー</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0;
            padding: 40px 20px; 
            color: #e2e8f0;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container { 
            position: relative;
            z-index: 1;
            max-width: 500px; 
            margin: 0 auto; 
            background: rgba(15, 23, 42, 0.65); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.6), 0 10px 10px -5px rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }

        h1 { font-size: 26px; text-align: center; color: #fff; margin-top: 0; margin-bottom: 25px; font-weight: 800; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 14px; 
            box-sizing: border-box; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 6px; 
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 15px;
            transition: 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
        }

        button.add-btn { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #38bdf8, #3b82f6); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        button.add-btn:hover { 
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        ul { list-style: none; padding: 0; margin-top: 25px; }

        .fav-item {
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.05); 
            padding: 12px 15px; 
            border-radius: 6px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(5px); 
            transition: 0.2s;
        }
        .fav-link {
            color: #64ffda; 
            text-decoration: none; 
            font-weight: bold; 
            letter-spacing: 0.5px;
        }
        .fav-url {
            font-weight: normal; 
            color: #8892b0; 
            font-size: 0.85em; 
            display: block; 
            margin-top: 2px;
        }
        .delete-btn {
            background-color: rgba(244, 63, 94, 0.15); 
            color: #f43f5e; 
            border: 1px solid #f43f5e; 
            padding: 6px 12px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: bold; 
            transition: 0.2s;
        }
        .delete-btn:hover {
            background: #f43f5e;
            color: #fff;
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="container">
        <h1>⭐ FAVORITES</h1>

        <input type="text" id="favTitle" placeholder="サイト名（例: Google）">
        <input type="text" id="favUrl" placeholder="URL" value="https://">
        <button class="add-btn" onclick="addFavorite()">お気に入りに追加</button>
        
        <ul id="favoriteList">
            <!-- ここにJavaScriptで動的にお気に入りが追加されます -->
        </ul>
    </div>

    <script>
        // --- 星の背景エフェクト ---
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let numStars = 100; 
        let stars = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.5 + 0.5, 
                speed: Math.random() * 0.5 + 0.1 
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; 
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.x -= star.speed;
                star.y += star.speed * 0.5;
                if (star.x < 0) { star.x = canvas.width; star.y = Math.random() * canvas.height; }
                if (star.y > canvas.height) { star.y = 0; star.x = Math.random() * canvas.width; }
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- API連携処理 ---
        // 起動時にデータを取得して描画する
        async function fetchFavorites() {
            const res = await fetch('/api/favorites');
            const favorites = await res.json();
            const listEl = document.getElementById('favoriteList');
            
            listEl.innerHTML = favorites.map(fav => `
                <li class="fav-item">
                    <a href="${fav.url}" target="_blank" class="fav-link">
                        ${fav.title} <span class="fav-url">${fav.url}</span>
                    </a>
                    <button onclick="deleteFavorite(${fav.id})" class="delete-btn">削除</button>
                </li>
            `).join('');
        }

        // 追加処理
        async function addFavorite() {
            const title = document.getElementById('favTitle').value.trim();
            const url = document.getElementById('favUrl').value.trim();
            
            if (!title || url === "https://") {
                alert('サイト名とURLを入力してください。');
                return;
            }

            await fetch('/api/favorites', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, url })
            });
            
            // 入力欄をクリアして再読込
            document.getElementById('favTitle').value = '';
            document.getElementById('favUrl').value = 'https://';
            fetchFavorites();
        }

        // 削除処理
        async function deleteFavorite(id) {
            await fetch('/api/favorites/' + id, { method: 'DELETE' });
            fetchFavorites();
        }

        // 初期読み込みを実行
        fetchFavorites();
    </script>
</body>
</html>
