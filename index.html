<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Time Bypass</title>
    <style>
        :root {
            --panel-bg: rgba(12, 17, 34, 0.85);
            --nebula-purple: #4b1b7f;
            --cosmic-blue: #0088cc;
            --text-color: #e0e5ff;
            --url-color: #8fa0cc;
            --alert-red: #d94141;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100%;
        }

        body {
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            
            /* 深宇宙のベースグラデーション */
            background: linear-gradient(135deg, #05020f 0%, #010003 100%) no-repeat fixed;
            position: relative;
            overflow-x: hidden;
        }

        /* 自由な浮遊運動を作るための星空レイヤー */
        body::before, body::after {
            content: "";
            position: fixed;
            top: -30%; left: -30%; width: 160%; height: 160%;
            background-color: transparent;
            z-index: -1;
            pointer-events: none;
        }

        /* レイヤー1: 手前の大きな星（大きな軌道で不規則に回転・浮遊） */
        body::before {
            background-image: radial-gradient(circle, #ffffff 2.5px, transparent 2.5px);
            background-size: 280px 280px;
            opacity: 0.6;
            /* 回転と移動のスピードを変えて組み合わせ、予測不能な動きにする */
            animation: cosmicFloat1 25s ease-in-out infinite alternate, cosmicRotate 50s linear infinite;
        }

        /* レイヤー2: 奥の小さな星（小さな軌道で細かく浮遊） */
        body::after {
            background-image: radial-gradient(circle, rgba(255,255,255,0.8) 1.5px, transparent 1.5px);
            background-size: 190px 190px;
            background-position: 45px 85px;
            opacity: 0.4;
            animation: cosmicFloat2 35s ease-in-out infinite alternate, cosmicRotate 80s linear infinite reverse;
        }

        /* 自転をかけるアニメーション */
        @keyframes cosmicRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 不規則な浮遊（うねり）を作るアニメーション1 */
        @keyframes cosmicFloat1 {
            0% { translate: 0px 0px; }
            33% { translate: 40px -60px; }
            66% { translate: -50px 30px; }
            100% { translate: 30px 50px; }
        }

        /* 不規則な浮遊（うねり）を作るアニメーション2 */
        @keyframes cosmicFloat2 {
            0% { translate: 0px 0px; }
            50% { translate: -60px -40px; }
            100% { translate: 50px -20px; }
        }

        h1 {
            color: #fff;
            text-shadow: 0 0 15px var(--cosmic-blue);
            font-size: 26px;
            letter-spacing: 1px;
            margin-top: 20px;
            margin-bottom: 30px;
            font-weight: 500;
            z-index: 1;
        }

        .main-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            backdrop-filter: blur(8px);
            z-index: 1;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #a2b4f0;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px;
            color: #fff;
            box-sizing: border-box;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--cosmic-blue);
            background: rgba(0, 0, 0, 0.8);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--cosmic-blue), var(--nebula-purple));
            border: none;
            color: #fff;
            padding: 14px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: opacity 0.2s;
            border-radius: 6px;
        }

        button:hover {
            opacity: 0.9;
        }

        .link-container {
            margin-top: 25px;
            width: 100%;
            max-width: 500px;
            z-index: 1;
        }

        .link-card {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .link-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(18, 25, 48, 0.9);
        }

        .link-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 75%;
            overflow: hidden;
        }

        .link-anchor {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .link-anchor:hover {
            text-decoration: underline;
            color: var(--cosmic-blue);
        }

        .link-url-sub {
            color: var(--url-color);
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .delete-btn {
            background: transparent;
            border: 1px solid var(--alert-red);
            color: var(--alert-red);
            width: auto;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: var(--alert-red);
            color: #fff;
        }
    </style>
</head>
<body>

    <h1>Screen Time Bypass</h1>

    <div class="main-panel">
        <form id="urlForm">
            <div class="form-group">
                <label>サイト名（タイトル）</label>
                <input type="text" id="titleInput" placeholder="例: Google" required>
            </div>
            <div class="form-group">
                <label>URL</label>
                <input type="url" id="urlInput" placeholder="https://..." required>
            </div>
            <button type="submit">URLを登録する</button>
        </form>
    </div>

    <div class="link-container" id="linkList">
        <!-- 登録されたURLがここに動的生成されます -->
    </div>

    <script>
        const urlForm = document.getElementById('urlForm');
        const linkList = document.getElementById('linkList');

        async function fetchUrls() {
            linkList.innerHTML = '';
            const res = await fetch('/api/urls');
            const urls = await res.json();
            
            urls.forEach(item => {
                const card = document.createElement('div');
                card.className = 'link-card';
                
                const infoDiv = document.createElement('div');
                infoDiv.className = 'link-info';

                const anchor = document.createElement('a');
                anchor.className = 'link-anchor';
                anchor.href = item.url;
                anchor.target = '_blank';
                anchor.textContent = item.name;
                
                const urlSub = document.createElement('div');
                urlSub.className = 'link-url-sub';
                urlSub.textContent = item.url;

                infoDiv.appendChild(anchor);
                infoDiv.appendChild(urlSub);
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '削除';
                deleteBtn.onclick = () => deleteUrl(item.id);
                
                card.appendChild(infoDiv);
                card.appendChild(deleteBtn);
                linkList.appendChild(card);
            });
        }

        urlForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('titleInput').value;
            const url = document.getElementById('urlInput').value;

            await fetch('/api/urls', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, url })
            });

            urlForm.reset();
            fetchUrls();
        });

        async function deleteUrl(id) {
            await fetch(`/api/urls/${id}`, { method: 'DELETE' });
            fetchUrls();
        }

        fetchUrls();
    </script>
</body>
</html>
